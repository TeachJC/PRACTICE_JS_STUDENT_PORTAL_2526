<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Login Page</title>

<style>
    body {
        background: url("https://media.istockphoto.com/id/1410005276/vector/gradient-white-abstract-design-background.jpg") no-repeat center/cover fixed;
        min-height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
        font-family: 'Segoe UI', sans-serif;
    }

        /* SIDEBAR */
    .sidebar {
        width: 250px;
        background: #111;
        color: white;
        min-height: 100vh;
        padding: 20px 15px;
    }

    .sidebar img {
        width: 100%;
        max-width: 180px;
        margin-bottom: 20px;
    }

    .nav-link {
        color: #ccc;
        padding: 10px;
        border-radius: 10px;
        transition: 0.3s;
    }

    .nav-link:hover {
        background: #333;
        color: #fff !important;
        transform: translateX(5px);
    }

    .login-wrapper {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    /* Glass + Silver Effect */
    .login-card {
        width: 100%;
        max-width: 420px;
        border-radius: 20px;
        padding: 30px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h2 {
        color: #111;
    }

    /* Inputs */
    .form-control {
        border-radius: 30px;
        text-align: center;
        background: rgba(255,255,255,0.85);
        border: 1px solid #ccc;
    }

    .form-control:focus {
        border-color: #888;
        box-shadow: 0 0 8px rgba(0,0,0,0.3);
    }

    .form-control::placeholder {
        color: #666;
    }

    /* Buttons */
    .btn-login {
        background: linear-gradient(135deg, #000, #555);
        color: white;
        border-radius: 30px;
        font-weight: 500;
    }

    .btn-login:hover {
        background: linear-gradient(135deg, #222, #777);
    }

    .btn-cancel {
        border-radius: 30px;
        background: #e0e0e0;
    }

    .btn-cancel:hover {
        background: #cfcfcf;
    }

    label {
        display: block;
        text-align: left;
        font-weight: 600;
        color: #111;
        margin-bottom: 6px;
        letter-spacing: 0.5px;
    }

    .label-highlight {
        color: #000;
        font-size: 0.9rem;
        text-transform: uppercase;
    }

    #logged_in {
        color: #ddd;
    }

    #display {
        color: #ff4d4d;
    }

    /* Footer */
    footer {
        background: #111;
        color: #ccc;
        text-align: center;
        padding: 10px;
        font-size: 12px;
    }
</style>

</head>

<body>

<div class="login-wrapper">
    <div class="login-card text-center">

        <img src="proj_logo.png" class="img-fluid mb-3" style="max-width: 170px;">

        <h2 class="fw-bold mb-3"> STUDENT PORTAL LOGIN</h2>

        <form>

           <label class="label-highlight">Username</label>
            <input type="text" id="uname" class="form-control mb-3" placeholder="Enter your username" required>

            <label class="label-highlight">Password</label>
            <input type="password" id="pwd" class="form-control mb-3" placeholder="Enter your password" required>

            <div class="form-check form-switch text-start mb-2">
                <input type="checkbox" id="stay" class="form-check-input" onclick="checklog()">
                <label class="form-check-label">Stay logged in</label>
            </div>

            <p id="logged_in" class="fst-italic small"></p>
            <p id="display" class="fst-italic small"></p>

            <div class="d-grid gap-2 mt-3">
                <input type="button" id="loginBTN" value="Login" class="btn btn-login" onclick="authenticate()">
                <input type="reset" value="Cancel" class="btn btn-cancel">
            </div>

            <hr>

            <a href="#" class="text-secondary small">Forgot username / password?</a>

        </form>

    </div>
</div>

<footer>
    Student Name | Grade & Section ©2026
</footer>

<script>
let attempt_counter = 0;

function authenticate() {
    let username = document.getElementById("uname").value;
    let pwd = document.getElementById("pwd").value;

    let granted = "Welcome " + username + "!";
    let denied = "Access denied. Account locked after 3 attempts!";

    if (attempt_counter < 3) {
        if (username === "student01" && pwd === "12345678") {
            alert(granted);
            attempt_counter = 0;
            document.getElementById("display").innerHTML = "";
            window.location.href = "dashboard.html";
        } else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username/password. Attempt " + attempt_counter + " of 3";
        }
    }

    if (attempt_counter >= 3) {
        alert(denied);
        document.getElementById("loginBTN").disabled = true;
    }
}

function checklog() {
    let stay = document.getElementById("stay").checked;

    document.getElementById("logged_in").innerHTML =
        stay ? "Your session will stay active on this device." : "";
}
</script>

</body>
</html>
